<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilka Apps & Mods</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🎮 Lilka Apps & Mods</h1>
        </div>
    </header>

    <nav class="tabs">
        <div class="container">
            <button class="tab-button active" data-type="apps">Apps</button>
            <button class="tab-button" data-type="mods">Mods</button>
            <button class="tab-button" data-type="authors">Authors</button>
            <button class="tab-button" data-type="docs">Documentation</button>
        </div>
    </nav>

    <main class="container">
        <div id="loading" class="loading">Loading...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="content">
            <div class="pagination">
                <button id="prevPage" class="btn" disabled>← Previous</button>
                <div id="pageNumbers" class="page-numbers"></div>
                <button id="nextPage" class="btn" disabled>Next →</button>
            </div>

            <div id="items" class="items-grid"></div>

            <div class="pagination">
                <button id="prevPageBottom" class="btn" disabled>← Previous</button>
                <div id="pageNumbersBottom" class="page-numbers"></div>
                <button id="nextPageBottom" class="btn" disabled>Next →</button>
            </div>
        </div>

        <div id="authors" class="authors-content" style="display: none;"></div>

        <div id="docs" class="docs-content" style="display: none;"></div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span id="lightboxClose" class="lightbox-close">&times;</span>
        <button id="lightboxPrev" class="lightbox-nav lightbox-prev">‹</button>
        <img id="lightboxImg" class="lightbox-image" src="" alt="Fullscreen">
        <button id="lightboxNext" class="lightbox-nav lightbox-next">›</button>
        <div id="lightboxCounter" class="lightbox-counter"></div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-links">
                <a href="https://discord.gg/HU68TaKCu6" target="_blank" rel="noopener noreferrer" data-umami-event="footer-link-discord">💬 Discord</a>
                <a href="https://docs.lilka.dev" target="_blank" rel="noopener noreferrer" data-umami-event="footer-link-docs">📚 Documentation</a>
                <a href="https://github.com/lilka-dev/catalog" target="_blank" rel="noopener noreferrer" data-umami-event="footer-link-github">🐙 GitHub</a>
            </div>
            <p class="footer-copyright">© 2026 Lilka Project</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="70fcef77-656a-4997-80c4-479960fb6530"></script>
</body>
</html>
